<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DevMarket — Products</title>
  </head>
  <body class="bg-gray-50 font-sans">
    <!-- Page Header -->
    <header
      class="bg-indigo-600 text-white px-6 py-4 flex justify-between items-center"
    >
      <h1 class="text-2xl font-bold">DevMarket</h1>
      <button
        id="reload-btn"
        class="bg-white text-indigo-600 font-semibold px-4 py-2 rounded-lg hover:bg-indigo-50 transition-colors"
      >
        Reload
      </button>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">Products</h2>

      <!-- Status message — loading / error -->
      <p id="status" class="text-center text-gray-500 text-lg py-12">
        Loading...
      </p>

      <!-- Products grid — empty at start -->
      <div
        id="products-grid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
      ></div>
    </main>

    <script src="async.js"></script>
  </body>
</html>
